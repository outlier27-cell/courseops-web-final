services:
  mysql:
    image: mysql:8.4
    container_name: courseops-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: courseops
      MYSQL_USER: courseops
      MYSQL_PASSWORD: courseops123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - courseops_mysql_data:/var/lib/mysql
      - ./courseops-backend/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  mongo:
    image: mongo:7
    container_name: courseops-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: courseops
      MONGO_INITDB_ROOT_PASSWORD: courseops123
      TZ: Asia/Shanghai
    ports:
      - "27017:27017"
    volumes:
      - courseops_mongo_data:/data/db

volumes:
  courseops_mysql_data:
  courseops_mongo_data:
